name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Find the project (unzip if needed)
        run: |
          find_settings() {
            find . \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -not -path "*/.*" | head -n 1
          }
          SETTINGS=$(find_settings)
          if [ -z "$SETTINGS" ]; then
            ZIP=$(find . -name "*.zip" -not -path "*/.*" | head -n 1)
            if [ -n "$ZIP" ]; then
              echo "Extracting $ZIP"
              unzip -q "$ZIP" -d _unzipped
              SETTINGS=$(find_settings)
            fi
          fi
          if [ -z "$SETTINGS" ]; then
            echo "No Gradle project and no zip found in the repo."
            exit 1
          fi
          echo "Found project at: $(dirname "$SETTINGS")"
          echo "PROJECT_DIR=$(dirname "$SETTINGS")" >> "$GITHUB_ENV"

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle assembleDebug --stacktrace

      - name: Rename APK
        run: mv "${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk" "${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/Anchor.apk"

      - name: Upload APK (downloads as a zip)
        uses: actions/upload-artifact@v4
        with:
          name: Anchor-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/Anchor.apk
